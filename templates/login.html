<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediAssist - Login</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS for grid / positioning -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">
    <div class="glass-bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="auth-card p-5 text-center">
            <div class="brand mb-4">
                <span class="brand-icon">⚕️</span>
                <h1 class="brand-name mt-2">MediAssist</h1>
                <p class="brand-tagline">Your Intelligent AI Healthcare Partner</p>
            </div>
            
            <h2 class="auth-title mb-4">Welcome Back</h2>
            
            {% if error %}
            <div class="alert alert-danger-custom mb-4" role="alert">
                {{ error }}
            </div>
            {% endif %}
            
            <form action="{{ url_for('login') }}" method="POST">
                <div class="form-group mb-3 text-start">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control form-control-custom" id="username" name="username" placeholder="Enter username" required autocomplete="off">
                </div>
                
                <div class="form-group mb-4 text-start">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control form-control-custom" id="password" name="password" placeholder="Enter password" required>
                </div>
                
                <button type="submit" class="btn btn-primary-custom w-100 py-3 mb-3">Sign In</button>
            </form>
            
            <div class="auth-footer mt-4">
                <p class="mb-0">New to MediAssist? <a href="{{ url_for('register') }}" class="auth-link">Create an Account</a></p>
            </div>
        </div>
    </div>
</body>
</html>
