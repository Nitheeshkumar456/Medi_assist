<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediAssist - Register</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS for grid / positioning -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">
    <div class="glass-bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container d-flex justify-content-center align-items-center min-vh-100 my-5">
        <div class="auth-card p-5 text-center my-4" style="max-width: 550px;">
            <div class="brand mb-3">
                <span class="brand-icon">⚕️</span>
                <h1 class="brand-name mt-2">MediAssist</h1>
                <p class="brand-tagline">Create your secure medical profile</p>
            </div>
            
            <h2 class="auth-title mb-4">Register Account</h2>
            
            {% if error %}
            <div class="alert alert-danger-custom mb-4" role="alert">
                {{ error }}
            </div>
            {% endif %}
            
            <form action="{{ url_for('register') }}" method="POST">
                <div class="row">
                    <div class="col-md-6 form-group mb-3 text-start">
                        <label for="username" class="form-label">Username *</label>
                        <input type="text" class="form-control form-control-custom" id="username" name="username" placeholder="Username" required autocomplete="off">
                    </div>
                    
                    <div class="col-md-6 form-group mb-3 text-start">
                        <label for="password" class="form-label">Password *</label>
                        <input type="password" class="form-control form-control-custom" id="password" name="password" placeholder="Password" required>
                    </div>
                </div>
                
                <div class="form-group mb-3 text-start">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control form-control-custom" id="email" name="email" placeholder="example@email.com">
                </div>
                
                <div class="row">
                    <div class="col-md-6 form-group mb-3 text-start">
                        <label for="age" class="form-label">Age</label>
                        <input type="number" class="form-control form-control-custom" id="age" name="age" placeholder="Age" min="1" max="120">
                    </div>
                    
                    <div class="col-md-6 form-group mb-3 text-start">
                        <label for="gender" class="form-label">Gender</label>
                        <select class="form-control form-control-custom form-select-custom" id="gender" name="gender">
                            <option value="" disabled selected>Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group mb-4 text-start">
                    <label for="medical_history" class="form-label">Known Medical Conditions (optional)</label>
                    <textarea class="form-control form-control-custom" id="medical_history" name="medical_history" rows="2" placeholder="e.g. Asthma, Hypertension, Allergies..."></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary-custom w-100 py-3 mb-3">Create Profile</button>
            </form>
            
            <div class="auth-footer mt-3">
                <p class="mb-0">Already registered? <a href="{{ url_for('login') }}" class="auth-link">Sign In here</a></p>
            </div>
        </div>
    </div>
</body>
</html>
